skills:
  - header: SOP.SKILL.SITE_STARTUP_RECOVERY
    sopVersion: 1.2.0
    status: active
    effectiveDate: 2026-02-15
    reviewer: Clinical Quality Review Board
    approvedBy: VP Clinical Operations
    approvalDate: 2026-02-16
    owners:
      - Global Site Ops Lead
      - Country Startup Manager
    intentKeywords:
      - site
      - startup
      - activation
      - ssu
      - 启动
      - 站点
      - aktivierung
    description: Recover delayed site activation against country-level startup baseline.
    sopSteps:
      - Check startup bottleneck by country and ethics package status.
      - Trigger accelerated document cycle with local startup vendor.
      - Escalate top 5 blocked sites to weekly governance board.
      - Re-forecast activation curve and update CTMS milestones.
    outputs:
      - Startup mitigation email
      - Site unblock tracker
      - Jira escalation tickets
    changeLog:
      - version: 1.2.0
        date: 2026-02-15
        author: Site Ops Excellence
        summary: Added governance escalation trigger and startup re-forecast step.
      - version: 1.1.0
        date: 2026-01-20
        author: Country CTM Council
        summary: Added country-level bottleneck check template.
  - header: SOP.SKILL.RECRUITMENT_RECOVERY
    sopVersion: 1.3.0
    status: active
    effectiveDate: 2026-02-22
    reviewer: Clinical Quality Review Board
    approvedBy: VP Clinical Development
    approvalDate: 2026-02-23
    owners:
      - Enrollment Director
      - Regional CTM
    intentKeywords:
      - recruit
      - enrollment
      - patient
      - 招募
      - 入组
      - rekrutierung
    description: Stabilize enrollment trajectory and reduce milestone slippage risk.
    sopSteps:
      - Segment low-performing sites by screen-failure and consent rate.
      - Launch targeted patient-finding channel playbook per country.
      - Reallocate recruitment support FTE to top opportunity sites.
      - Publish 2-week recovery trajectory and confidence range.
    outputs:
      - Recovery plan memo
      - Country recruitment actions
      - Milestone risk note
    changeLog:
      - version: 1.3.0
        date: 2026-02-22
        author: Patient Strategy Office
        summary: Added 2-week recovery trajectory and confidence reporting.
      - version: 1.2.0
        date: 2026-01-28
        author: Regional CTM Forum
        summary: Added site segmentation by screen-failure behavior.
  - header: SOP.SKILL.BUDGET_GUARDRAIL
    sopVersion: 1.1.0
    status: active
    effectiveDate: 2026-02-01
    reviewer: Clinical Governance Office
    approvedBy: Head of Trial Finance
    approvalDate: 2026-02-02
    owners:
      - Trial Finance
      - Procurement Partner
    intentKeywords:
      - budget
      - cost
      - spend
      - burn
      - 预算
      - kosten
    description: Contain burn-rate drift while protecting critical milestones.
    sopSteps:
      - Run variance analysis by vendor, region, and activity bucket.
      - Freeze non-critical discretionary spend for current cycle.
      - Shift spend to milestone-critical tasks and renegotiate rates.
      - Submit updated EAC with mitigation assumptions.
    outputs:
      - Budget variance report
      - Mitigation action register
      - EAC revision
    changeLog:
      - version: 1.1.0
        date: 2026-02-01
        author: Trial Finance CoE
        summary: Added EAC submission requirements.
  - header: SOP.SKILL.FTE_REALLOCATION
    sopVersion: 1.0.0
    status: active
    effectiveDate: 2026-01-18
    reviewer: Clinical Delivery Governance
    approvedBy: Clinical Delivery Director
    approvalDate: 2026-01-19
    owners:
