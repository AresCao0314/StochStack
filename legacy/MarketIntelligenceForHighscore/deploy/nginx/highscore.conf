server {
    listen 80;
    server_name _;

    root /opt/highscore/HighscoreMarketIntelligence;
    index web/index.html;

    location / {
        try_files $uri $uri/ /web/index.html;
    }

    location /data/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
        try_files $uri =404;
    }

    location /web/ {
        try_files $uri =404;
    }
}
