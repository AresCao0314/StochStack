<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highscore Clinical Intelligence Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="hero">
      <div class="hero-topbar">
        <p class="eyebrow" id="eyebrowText">Clinical Development Intelligence</p>
        <div class="lang-switch-wrap">
          <label for="langSwitch" id="langLabel">Language</label>
          <select id="langSwitch" aria-label="Language switcher">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
      </div>
      <h1 id="heroTitle">Highscore Multi-Program Signal Platform</h1>
      <p class="sub" id="heroSub">
        面向 10 个 clinical development 战略项目，持续跟踪申办方、技术平台、vendor、合作关系、成效指标、咨询报告与学术案例。
      </p>
      <div class="hero-metrics" id="heroMetrics"></div>
    </header>

    <main>
      <section class="panel daily-panel">
        <div class="section-header">
          <h2 id="dailyTitle">今日更新</h2>
          <span id="dailyUpdatedAt"></span>
        </div>
        <div class="daily-metrics" id="dailyMetrics"></div>
        <div class="daily-lists">
          <div class="daily-block">
            <h3 id="dailyNewTitle">新增信号</h3>
            <ul id="dailyNewList"></ul>
          </div>
          <div class="daily-block">
            <h3 id="dailyWatchTitle">科技巨头动向</h3>
            <ul id="dailyWatchList"></ul>
          </div>
        </div>
      </section>

      <section class="panel filters">
        <div class="filter-item">
          <label for="projectFilter" id="projectFilterLabel">项目</label>
          <select id="projectFilter"></select>
        </div>
        <div class="filter-item">
          <label for="topicFilter" id="topicFilterLabel">主题</label>
          <select id="topicFilter"></select>
        </div>
        <div class="filter-item">
          <label for="dateFilter" id="dateFilterLabel">时间窗口</label>
          <select id="dateFilter"></select>
        </div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2 id="radarTitle">Program Radar</h2>
          <span id="resultCount"></span>
        </div>
        <div id="signalGrid" class="signal-grid"></div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2 id="projectMapTitle">10 项目地图</h2>
        </div>
        <div id="projectGrid" class="project-grid"></div>
      </section>
    </main>

    <template id="signalCardTemplate">
      <article class="signal-card">
        <div class="chip-row">
          <span class="chip project"></span>
          <span class="chip topic"></span>
          <span class="chip score"></span>
        </div>
        <h3 class="signal-title"></h3>
        <p class="signal-summary"></p>
        <div class="meta"></div>
        <a class="signal-link" target="_blank" rel="noreferrer"></a>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
