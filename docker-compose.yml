services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stochstack-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  caddy:
    image: caddy:2.8-alpine
    container_name: stochstack-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
